<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Random</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- =========================
         HEADER
    ========================== -->

    <header class="main-header">

        <!-- LOGO -->
        <div class="logo-section">
            <h1 class="logo-title">Pokemon Random</h1>
        </div>

        <!-- NAVIGATION -->
        <nav class="navbar">
            <a href="index.html">Home</a>
            <a href="report.html">Reports</a>
            <a href="details.html">Logs</a>
            <a href="login.html">Logout</a>
        </nav>

        <!-- USER INFO -->
        <div class="user-section">
            <span class="username">Natalia</span>
        </div>

    </header>


    <!-- =========================
         HERO SECTION
    ========================== -->

    <section class="hero-section">

        <div class="hero-content">
            <h2>Generate Random Pokémon</h2>
            <p>
                Discover random Pokémon and improve your score.
            </p>

            <button class="generate-button">
                Get Pokémon
            </button>
        </div>

    </section>


    <!-- =========================
         SCORE SECTION
    ========================== -->

    <section class="score-section">

        <div class="score-card">
            <h3>Current Score</h3>
            <p>120</p>
        </div>

        <div class="score-card">
            <h3>Best Score</h3>
            <p>350</p>
        </div>

    </section>


    <!-- =========================
         POKEMON CONTAINER
    ========================== -->

    <main class="pokemon-container">

        <!-- CARD 1 -->
        <article class="pokemon-card">

            <div class="pokemon-image">
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png"
                    alt="Pikachu">
            </div>

            <div class="pokemon-info">

                <h3 class="pokemon-name">Pikachu</h3>

                <div class="pokemon-types">
                    <span class="type electric">Electric</span>
                </div>

                <p class="pokemon-weight">
                    Weight: 6kg
                </p>

                <div class="pokemon-hp">
                    <p>HP: 120</p>

                    <div class="hp-bar">
                        <div class="hp-fill"></div>
                    </div>
                </div>

            </div>

        </article>

    </main>
    <script src="../scripts/app.js"></script>
</body>

</html>
