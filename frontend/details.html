<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Random | Logs</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- =========================
         HEADER
    ========================== -->

    <header class="details-header">

        <h1>Application Logs</h1>

        <nav class="details-nav">
            <a href="index.html">Home</a>
            <a href="report.html">Reports</a>
            <a href="login.html">Logout</a>
        </nav>

    </header>


    <!-- =========================
         LOGS CONTAINER
    ========================== -->

    <main class="logs-container">

        <!-- LOG CARD -->
        <article class="log-card">

            <div class="log-item">
                <h3>Event Type</h3>
                <p>User Login</p>
            </div>

            <div class="log-item">
                <h3>Route Accessed</h3>
                <p>/login.html</p>
            </div>

            <div class="log-item">
                <h3>Timestamp</h3>
                <p>2026-05-15 10:00 AM</p>
            </div>

            <div class="log-item">
                <h3>Description</h3>
                <p>User logged into the application successfully.</p>
            </div>

        </article>

    </main>

</body>
</html>
