<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Random | Login</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- =========================
         LOGIN CONTAINER
    ========================== -->

    <main class="login-container">

        <!-- LOGIN CARD -->
        <section class="login-card">

            <!-- LOGO / TITLE -->
            <div class="login-header">
                <h1 class="login-title">Pokemon Random</h1>
                <p class="login-subtitle">
                    Enter your account to start playing
                </p>
            </div>

            <form class="login-form" method="POST" action="../backend/login.php">

                <div id="error-message"
                    style="color: var(--primary-color); text-align: center; font-weight: 600; font-size: 14px; margin-bottom: 15px; display: none;">
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="login-button">
                    Login
                </button>
            </form>

            <script>
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('error')) {
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.textContent = urlParams.get('error');
                    errorDiv.style.display = 'block';
                }
            </script>
        </section>

    </main>

</body>

</html>
